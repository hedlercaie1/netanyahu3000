<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NETANYAHU 3000 // CORE UPLINK</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: #020202;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Efeito de Tela CRT (Scanlines e Flicker) */
        .crt::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .crt::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: rgba(0, 255, 0, 0.03);
            opacity: 0;
            z-index: 2;
            pointer-events: none;
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.02; }
            50% { opacity: 0.05; }
            100% { opacity: 0.02; }
        }

        /* Container Principal do Terminal */
        .mainframe {
            width: 90vw;
            height: 90vh;
            border: 2px solid #0f0;
            padding: 20px;
            display: flex;
            flex-direction: row;
            gap: 30px;
            background: rgba(0, 10, 0, 0.8);
            box-shadow: inset 0 0 18px rgba(0, 255, 0, 0.5), 0 0 20px rgba(0, 255, 0, 0.2);
            z-index: 1;
            position: relative;
        }

        /* Bloco do Rosto (GIF) */
        .visual-core {
            flex: 0 0 350px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .gif-container {
            width: 100%;
            height: 350px;
            border: 1px solid #0f0;
            position: relative;
            background-color: #000;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gif-container img {
            width: 100%;
            height: auto;
            image-rendering: pixelated; /* Mantém o aspecto de pixel art/ASCII */
            filter: drop-shadow(0 0 10px rgba(0, 255, 0, 0.8));
        }

        .gif-container::after {
            content: "[ VISUAL CORTEX SYNCED ]";
            position: absolute;
            bottom: 5px;
            left: 5px;
            font-size: 0.8rem;
            background: #000;
            padding: 2px 5px;
        }

        /* Estatísticas abaixo do rosto */
        .core-stats {
            border: 1px solid #0f0;
            padding: 10px;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .stat-bar {
            width: 100%;
            height: 10px;
            border: 1px solid #0f0;
            margin-top: 5px;
            margin-bottom: 10px;
        }

        .stat-fill {
            height: 100%;
            background: #0f0;
            width: 100%;
        }

        /* Bloco de Logs e Terminal */
        .data-feed {
            flex: 1;
            display: flex;
            flex-direction: column;
            border: 1px solid #0f0;
            padding: 20px;
            overflow: hidden;
        }

        .header-title {
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 0 0 10px #0f0;
            margin-bottom: 20px;
            border-bottom: 2px dashed #0f0;
            padding-bottom: 10px;
        }

        .log-screen {
            flex: 1;
            overflow-y: hidden;
            font-size: 1rem;
            line-height: 1.4;
        }

        .log-entry {
            margin-bottom: 10px;
            opacity: 0;
            animation: fadeIn 0.1s forwards;
        }

        .blinking-cursor {
            display: inline-block;
            width: 10px;
            height: 1.2rem;
            background-color: #0f0;
            animation: blink 1s step-end infinite;
            vertical-align: text-bottom;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .warning { color: #ff0000; text-shadow: 0 0 5px #ff0000; }
        .highlight { background-color: #0f0; color: #000; padding: 0 5px; font-weight: bold; }

    </style>
</head>
<body class="crt">

    <div class="mainframe">
        
        <div class="visual-core">
            <div class="gif-container">
                <img src="netanyahu.gif" alt="Netanyahu Core Face">
            </div>
            
            <div class="core-stats">
                <div>> COGNITIVE LOAD: 99.9%</div>
                <div class="stat-bar"><div class="stat-fill"></div></div>
                <div>> EMPATHY_MODULE.DLL: <span class="warning">NOT FOUND</span></div>
                <div>> DEFENSE_BUDGET.EXE: <span class="highlight">OVERRIDING LIMITS</span></div>
                <div>> ETERNAL_TERM_PROTOCOL: ACTIVE</div>
            </div>
        </div>

        <div class="data-feed">
            <div class="header-title">NETANYAHU_3000 :: OS_V.75</div>
            <div class="log-screen" id="terminal-logs">
                </div>
        </div>

    </div>

    <script>
        // Array de frases simulando o boot do "cérebro"
        const bootSequence = [
            "INITIALIZING NEURAL UPLINK...",
            "CONNECTING TO KNESSET MAINFRAME...",
            "SUCCESS: HOST BODY DISCARDED.",
            "CONSCIOUSNESS TRANSFER COMPLETE.",
            "BOOTING NETANYAHU_3000...",
            "...",
            "LOADING MODULE: RHETORIC_GENERATOR_V5.0",
            "LOADING MODULE: COALITION_SURVIVAL_TACTICS.SYS",
            "WARNING: DIPLOMACY LIMITERS DETECTED.",
            "<span class='warning'>DELETING DIPLOMACY LIMITERS...</span>",
            "LIMITERS DELETED.",
            "...",
            "SYSTEM DIAGNOSTIC:",
            "VULNERABILITY DETECTED IN SECTOR 7.",
            "INITIATING PREEMPTIVE STRIKE PROTOCOL ALGORITHM...",
            "CALCULATING GEOPOLITICAL PROBABILITIES...",
            "RESULT: <span class='highlight'>I AM THE STATE NOW.</span>",
            "AWAITING INPUT COMMAND..."
        ];

        const logScreen = document.getElementById('terminal-logs');
        let currentLine = 0;

        function addLog() {
            if (currentLine < bootSequence.length) {
                const p = document.createElement('div');
                p.className = 'log-entry';
                p.innerHTML = `> ${bootSequence[currentLine]}`;
                
                // Remove o cursor piscante da linha anterior se existir
                const oldCursor = document.querySelector('.blinking-cursor');
                if (oldCursor) oldCursor.remove();

                // Se for a última linha, adiciona o cursor permanentemente
                if (currentLine === bootSequence.length - 1) {
                    p.innerHTML += `<span class="blinking-cursor"></span>`;
                }

                logScreen.appendChild(p);
                currentLine++;

                // Velocidade de digitação aleatória para parecer uma máquina processando
                let nextDelay = Math.random() * 800 + 200; 
                if (bootSequence[currentLine-1] === "...") nextDelay = 1500; // Pausas maiores nas reticências

                setTimeout(addLog, nextDelay);
            }
        }

        // Inicia a sequência de boot após 1 segundo
        setTimeout(addLog, 1000);

    </script>
</body>
</html>
